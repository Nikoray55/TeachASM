<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeachASM - Байланыс</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="contact-page-body">

    <nav class="navbar">
        <div class="container nav-flex">
            <div class="logo">Teach<span>ASM</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Басты бет</a></li>
                <li><a href="links.html">Сілтемелер</a></li>
                <li><a href="prompts.html">Промттар</a></li>
                <li><a href="templates.html">Шаблондар</a></li>
                <li><a href="contact.html" class="active">Байланыс</a></li>
            </ul>
        </div>
    </nav>

    <div class="container content-wrapper">
        <div class="page-title">
            <h1>Бізбен байланыс</h1>
            <p>Сұрақтарыңыз бен ұсыныстарыңыз болса, жазудан тартынбаңыз</p>
        </div>

        <section class="contact-section">
            <div class="contact-container">
                
                <div class="contact-info">
                    <a href="mailto:info@teachasm.kz" class="info-card-link">
                        <div class="info-card">
                            <i class="fas fa-envelope"></i>
                            <div class="info-text">
                                <h4>Email</h4>
                                <p>info@teachasm.kz</p>
                            </div>
                        </div>
                    </a>
                    
                    <a href="https://t.me/TeachASM_support" target="_blank" class="info-card-link">
                        <div class="info-card">
                            <i class="fab fa-telegram"></i>
                            <div class="info-text">
                                <h4>Telegram</h4>
                                <p>@TeachASM_support</p>
                            </div>
                        </div>
                    </a>
                    
                    <a href="https://www.google.com/maps/search/?api=1&query=Актобе" target="_blank" class="info-card-link">
                        <div class="info-card">
                            <i class="fas fa-map-marker-alt"></i>
                            <div class="info-text">
                                <h4>Мекен-жай</h4>
                                <p>Қазақстан, Ақтөбе қаласы</p>
                            </div>
                        </div>
                    </a>
                </div>

                <form class="contact-form">
                    <div class="form-group">
                        <label>Аты-жөніңіз</label>
                        <input type="text" placeholder="Атыңызды енгізіңіз" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email мекенжайыңыз</label>
                        <input type="email" placeholder="example@mail.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Хабарламаңыз</label>
                        <textarea placeholder="Сұрағыңызды осында жазыңыз..." rows="5" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-paper-plane"></i> Жіберу
                    </button>
                </form>

            </div>
        </section>
    </div>

</body>
</html>
